version: "3.9"

# ============================================================
# Autonomous Hazard Perception System — Docker Compose
#
# Services:
#   model    → YOLOv8 ONNX inference server (port 8001)
#   api      → FastAPI backend + WebSocket (port 8000)
#   frontend → Next.js dashboard (port 3000)
#
# Networking: All services share the "hazard-net" bridge
# network. Services reference each other by service name
# (e.g., http://model:8001) — no hardcoded IPs needed.
# ============================================================

services:
  # ----------------------------------------------------------
  # MODEL SERVICE
  # Runs the YOLOv8 ONNX model for inference.
  # Separated from the API so it can be scaled independently
  # or replaced with a GPU-optimized container.
  # ----------------------------------------------------------
  model:
    build:
      context: ./model
      dockerfile: Dockerfile
    container_name: hazard-model
    ports:
      - "8001:8001"
    volumes:
      # Mount weights from host so you can swap models without rebuilding
      - ./model/weights:/app/weights:ro
      - ./logs/model:/app/logs
    environment:
      - MODEL_PATH=/app/weights/best.onnx
      - LOG_LEVEL=INFO
    networks:
      - hazard-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ----------------------------------------------------------
  # API SERVICE (FastAPI + WebSocket)
  # Orchestrates the full pipeline: video ingestion,
  # calling model service, risk scoring, and streaming
  # to frontend clients via WebSocket.
  # ----------------------------------------------------------
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: hazard-api
    ports:
      - "8000:8000"
    volumes:
      - ./logs/api:/app/logs
      - ./data/uploads:/app/uploads
    environment:
      - MODEL_SERVICE_URL=http://model:8001
      - LOG_LEVEL=INFO
      - CORS_ORIGINS=http://localhost:3000,http://frontend:3000
    networks:
      - hazard-net
    depends_on:
      model:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ----------------------------------------------------------
  # FRONTEND SERVICE (Next.js)
  # Serves the live dashboard, analytics, and upload UI.
  # In production, this sits behind an Nginx reverse proxy.
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hazard-frontend
    ports:
      - "3000:3000"
    environment:
      # These are injected at build time for Next.js
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    networks:
      - hazard-net
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

# ----------------------------------------------------------
# NETWORKS
# Bridge mode: containers are isolated from host network
# but can communicate with each other by service name.
# ----------------------------------------------------------
networks:
  hazard-net:
    driver: bridge

# ----------------------------------------------------------
# VOLUMES (named volumes for persistent data)
# ----------------------------------------------------------
volumes:
  model-weights:
  api-logs:
  upload-cache:
