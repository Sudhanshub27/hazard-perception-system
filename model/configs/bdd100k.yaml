# ============================================================
# BDD100K Dataset Configuration for YOLO26
#
# This file tells the Ultralytics trainer where your data is
# and what classes to detect. We'll populate the actual paths
# in Phase 2 after downloading and converting BDD100K.
# ============================================================

# Root path to dataset (absolute path or relative to this file)
path: C:\Users\Sudhanshu\projects\yolo\data\processed\bdd100k_yolo

# Relative paths within 'path' above
train: images/train
val:   images/val
test:  images/test

# Number of classes
nc: 10

# Class names — BDD100K 10-class detection set
# Order matters: index 0 = car, index 1 = truck, etc.
names:
  0: car
  1: truck
  2: bus
  3: person
  4: rider
  5: bicycle
  6: motorcycle
  7: traffic light
  8: traffic sign
  9: train

# ============================================================
# Notes for Phase 3 (Training):
#   - These are the same 10 classes used in the official BDD100K
#     detection benchmark (no "train" class in practice since
#     it has <500 instances — you can merge it with "bus" or drop it)
#   - We resize all images to 640x640 at training time via
#     YOLO26's built-in augmentation pipeline
# ============================================================
